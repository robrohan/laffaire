{{ template "header.html" . }} {{ template "nav_secure.html" . }}

<h1>Projects</h1>

<a href="/-/event">+New</a>

<section class="content">
    <table class="fl-table">
        <thead>
        <tr>
            <th width="40%">Title</th>
            <th width="40%">Description</th>
            <th width="20%">&nbsp;</th>
        </tr>
        </thead>

        <tbody>
        {{ range $val := .Events }}
        <tr>
            <td><a href="/ical/{{ $val.UUID }}">{{ $val.Title }}</a></td>
            <td>{{ $val.Description }}</td>
            <td class="table-control">
                <a href="/-/entries?event={{ $val.UUID }}">📑</a>
                <a href="/-/event?event={{ $val.UUID }}">🖋️</a>
                <a href="#">❌</a>
            </td>
        </tr>
        {{ end }}
        </tbody>
    </table>
</section>

{{ template "footer.html" . }}
