{{ template "header.html" . }} {{ template "nav_secure.html" . }}

<h1>Entry</h1>

<form action="/-/entry" method="POST">
    <input type="hidden" name="event_uuid">

    <div class="control">
        <label for="subject">Subject</label>
        <input type="text" name="subject" id="subject" />
    </div>

    <div class="control">
        <label for="start_date">Start Date</label>
        <input type="date" id="start_date" name="start_date" />
    </div>

    <div class="control">
        <label for="start_time">Start Time</label>
        <input type="time" id="start_time" name="start_time" />
    </div>

    <div class="control">
        <label for="end_date">End Date</label>
        <input type="date" id="end_date" name="end_date" />
    </div>

    <div class="control">
        <label for="end_time">End Time</label>
        <input type="time" id="end_time" name="end_time" />
    </div>

    <div class="control">
        <label for="all_day_event">All Day Event</label>
        <label class="switch" for="all_day_event">
            <input type="checkbox" id="all_day_event" name="all_day_event" />
            <span class="slider"></span>
        </label>
    </div>

    <div class="control">
        <label for="description">Description</label>
        <textarea id="description" wrap="soft" name="description"></textarea>
    </div>

    <div class="control">
        <label for="location">Location</label>
        <input type="text" name="location" id="location" />
    </div>

    <div class="control">
        <label for="private">Private</label>
        <label class="switch" for="private">
            <input type="checkbox" id="private" name="private" />
            <span class="slider"></span>
        </label>
    </div>

    <div class="control">
        <input type="submit" value="Submit">
    </div>
</form>

{{ template "footer.html" . }}
